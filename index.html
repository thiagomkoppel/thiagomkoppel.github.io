<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thiago Koppel | Software Developer</title>
  <meta name="description" content="Portfolio website for Thiago Koppel, Software Developer specializing in artificial intelligence, systems engineering, and cross-platform software development." />
  <style>
    :root {
      --bg: #0b1020;
      --bg-soft: #121a33;
      --card: rgba(255, 255, 255, 0.06);
      --text: #eef2ff;
      --muted: #aab4d6;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #7c9cff;
      --accent-2: #8ef0d0;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
      --radius: 20px;
      --maxw: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124, 156, 255, 0.22), transparent 30%),
        radial-gradient(circle at top right, rgba(142, 240, 208, 0.15), transparent 25%),
        linear-gradient(180deg, #08101f 0%, #0b1020 100%);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(var(--maxw), calc(100% - 2rem));
      margin: 0 auto;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(14px);
      background: rgba(8, 16, 31, 0.7);
      border-bottom: 1px solid var(--line);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      gap: 1rem;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0.02em;
      font-size: 1.05rem;
    }

    .brand span {
      color: var(--accent-2);
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 0.95rem;
      transition: 0.2s ease;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .hero {
      padding: 5rem 0 3rem;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(340px, 420px);
      gap: 2.5rem;
      align-items: start;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.85rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--accent-2);
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.9rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    h1 {
      font-size: clamp(2.8rem, 6vw, 5.25rem);
      line-height: 1.02;
      margin: 0 0 1.1rem;
      letter-spacing: -0.04em;
      max-width: 11ch;
    }

    .hero-copy {
      font-size: 1.08rem;
      color: var(--muted);
      max-width: 62ch;
      margin: 0 0 1.5rem;
    }

    .accent {
      color: var(--accent-2);
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      margin-top: 1.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.95rem 1.2rem;
      border-radius: 14px;
      border: 1px solid transparent;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #95aefd);
      color: #091124;
      box-shadow: var(--shadow);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
    }

    .btn-secondary {
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .hero-card,
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 1.4rem;
    }

    .profile {
      display: grid;
      gap: 1rem;
    }

    .profile-top {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 1rem;
      align-items: center;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0b1020;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 1.8rem;
      flex-shrink: 0;
    }

    .profile-text {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.25rem;
    }

    .profile-name {
      font-size: 1.1rem;
      font-weight: 800;
      line-height: 1.2;
      margin: 0;
    }

    .profile-role {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.55;
      max-width: 30ch;
    }

    .muted {
      color: var(--muted);
    }

    .mini-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      grid-template-areas:
        "focus location"
        "tech experience";
      gap: 1rem;
      align-items: stretch;
    }

    .mini-box {
      padding: 1.1rem;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      min-width: 0;
      height: 100%;
    }

    .mini-box h4 {
      margin: 0 0 0.55rem;
      font-size: 0.98rem;
      line-height: 1.2;
    }

    .mini-box p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .box-focus { grid-area: focus; }
    .box-location { grid-area: location; }
    .box-tech { grid-area: tech; }
    .box-experience { grid-area: experience; }

    .box-location {
      padding-top: 0.95rem;
      padding-bottom: 0.95rem;
      align-self: start;
    }

    .box-experience {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    section {
      padding: 1.5rem 0 0.5rem;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    h2 {
      font-size: clamp(1.6rem, 2vw, 2.2rem);
      margin: 0;
      letter-spacing: -0.02em;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
    }

    .about-grid,
    .projects-grid,
    .contact-grid {
      display: grid;
      gap: 1rem;
    }

    .about-grid {
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
    }

    .projects-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .card {
      padding: 1.4rem;
    }

    .stack {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: 1rem;
    }

    .tag {
      padding: 0.45rem 0.7rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 0.92rem;
    }

    .project-title-row {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .project-title-row h3,
    .contact-card h3,
    .card h3 {
      margin: 0;
      font-size: 1.1rem;
    }

    .project-link {
      color: var(--accent-2);
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .project p,
    .contact-card p,
    .education-item p,
    .education-item span {
      color: var(--muted);
      margin: 0.5rem 0 0;
    }

    .contact-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 3rem;
    }

    .contact-list {
      display: grid;
      gap: 0.8rem
